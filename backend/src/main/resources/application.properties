spring.application.name=article-submission-system

spring.datasource.url=${APP_DB_URL:jdbc:postgresql://localhost:5432/article_submission_system}
spring.datasource.username=${APP_DB_USERNAME:postgres}
spring.datasource.password=${APP_DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.prometheus.metrics.export.enabled=true
management.metrics.tags.application=${spring.application.name}

server.forward-headers-strategy=framework
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:4173}
app.storage.submission-files-dir=${APP_SUBMISSION_FILES_DIR:./data/submission-files}
app.jwt.secret=${APP_JWT_SECRET:MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=}
app.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:3600000}

spring.servlet.multipart.max-file-size=25MB
spring.servlet.multipart.max-request-size=30MB
